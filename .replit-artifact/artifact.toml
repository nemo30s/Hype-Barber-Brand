kind = "web"
previewPath = "/"
title = "HYPE Barber"
version = "1.0.0"
id = "artifacts/hype-barber"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20919

[services.development]
run = "pnpm --filter @workspace/hype-barber run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hype-barber", "run", "build" ]
publicDir = "artifacts/hype-barber/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20919"
BASE_PATH = "/"
